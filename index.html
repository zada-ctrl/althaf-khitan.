<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Walimatul Khitan</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Plus+Jakarta+Sans&display=swap" rel="stylesheet">
</head>
<body>

    <!-- LOADING SCREEN -->
    <div id="loader" class="loader-container">
        <div class="loader-content">
            <p>Memuat Undangan Premium...</p>
        </div>
    </div>

    <!-- HALAMAN WELCOME -->
    <div id="app" style="display: none; text-align: center; padding: 50px 20px;">
        <h1 style="font-family: 'Cinzel', serif; color: #bf9456;">Walimatul Khitan</h1>
        <p id="guest-name" style="margin: 20px 0;"></p>
        <button id="btn-open" class="btn-premium">Buka Undangan</button>
    </div>

    <!-- ISI UNDANGAN (Awalnya tersembunyi) -->
    <div id="undangan-lengkap" style="display: none; padding: 20px;">
        <h2 style="color: #064E3B;">Alhamdulillah</h2>
        <p>Dengan memohon rahmat Allah SWT, kami mengundang Bapak/Ibu untuk hadir di acara khitan putra kami.</p>
        <!-- Nanti kamu bisa tambahkan lokasi, tanggal, dll di sini -->
    </div>

    <script src="script.js"></script>
</body>
</html>
